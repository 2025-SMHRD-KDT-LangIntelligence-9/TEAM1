<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToneGuard 로그인 & 회원가입</title>
    
    <style>
        /* =========================================
           [1] 기본 레이아웃 및 배경 설정
           ========================================= */
        body { 
            font-family: '맑은 고딕', sans-serif; 
            background: #F4F7FA; 
            display: flex; 
            justify-content: center; /* 가로 중앙 정렬 */
            align-items: center;     /* 세로 중앙 정렬 */
            min-height: 100vh;       /* 화면 전체 높이 차지 */
            margin: 0; 
        }
        
        /* 메인 하얀색 카드 디자인 */
        .card-box { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); /* 은은한 그림자 */
            width: 380px; 
            text-align: center; 
            border: 1px solid #E2E8F0; 
        }
        
        /* =========================================
           [2] 폼(Form) 입력창 디자인
           ========================================= */
        .input-group { margin-bottom: 15px; text-align: left; }
        
        /* 입력창 위의 제목 라벨 */
        .input-group label { display: block; font-size: 12px; color: #64748B; margin-bottom: 5px; font-weight: bold; }
        
        /* 텍스트 입력창 기본 스타일 */
        input { 
            width: 100%; 
            padding: 12px 15px; 
            border: 1px solid #CBD5E1; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 14px; 
            background: #F8FAFC; 
        }
        
        /* 입력창 포커스(클릭) 시 테두리 색상 변경 */
        input:focus { outline: none; border-color: #3B82F6; background: white; }

        /* =========================================
           [3] 버튼 디자인 모음
           ========================================= */
        /* 기본 파란색 버튼 (로그인용) */
        .btn-primary { 
            width: 100%; padding: 14px; background: #3B82F6; color: white; 
            border: none; border-radius: 12px; font-size: 15px; font-weight: bold; 
            cursor: pointer; transition: 0.2s; margin-top: 10px; 
        }
        .btn-primary:hover { background: #2563EB; } 
        
        /* 초록색 성공 버튼 (회원가입용) - .btn-primary와 같이 사용됨 */
        .btn-success { background: #10B981; }
        .btn-success:hover { background: #059669; }

        /* 텍스트 형태의 링크 버튼 (화면 전환용) */
        .btn-text { 
            background: transparent; color: #64748B; border: none; font-size: 13px; 
            margin-top: 15px; cursor: pointer; text-decoration: underline; 
        }
        .btn-text:hover { color: #1E293B; }

        /* =========================================
           [4] 화면 초기 상태 제어
           ========================================= */
        /* 접속 시 회원가입 박스는 안 보이도록 숨김 */
        #register-box { display: none; }
    </style>
</head>
<body>

    <div class="card-box" id="login-box">
        <h2 style="color: #3B82F6; margin-bottom: 5px;">ToneGuard</h2>
        <p style="color: #64748B; font-size: 14px; margin-bottom: 30px;">환영합니다! 서비스를 시작하세요.</p>
        
        <form action="/login_process" method="post">
            <div class="input-group">
                <input type="email" name="email" placeholder="Email" required autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-primary">로그인</button>
        </form>
        
        <button type="button" class="btn-text" onclick="toggleView('register')">회원가입 하기</button>
    </div>

    <div class="card-box" id="register-box">
        <h2 style="color: #3B82F6; margin-bottom: 5px;">회원가입</h2>
        <p style="color: #64748B; font-size: 13px; margin-bottom: 25px;">(*) 표시는 필수 입력 항목입니다.</p>
        
        <form action="/register_process" method="post">
            <div class="input-group">
                <label>이메일 (*)</label>
                <input type="email" name="email" placeholder="user@email.com" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>비밀번호 (*)</label>
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <div class="input-group">
                <label>이름 또는 닉네임 (*)</label>
                <input type="text" name="name" placeholder="Name or Nickname" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>소속 (선택)</label>
                <input type="text" name="dept" placeholder="소속 (생략 가능)">
            </div>
            <div class="input-group">
                <label>직무 (선택)</label>
                <input type="text" name="job" placeholder="직무 (생략 가능)">
            </div>

            <button type="submit" class="btn-primary btn-success">가입 완료</button>
        </form>

        <button type="button" class="btn-text" onclick="toggleView('login')">로그인 화면으로 돌아가기</button>
    </div>

    <script>
        /**
         * 로그인 박스와 회원가입 박스를 서로 교체해서 보여주는 함수
         * @param {string} target - 'register' 또는 'login'
         */
        function toggleView(target) {
            if (target === 'register') {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('register-box').style.display = 'block';
            } else {
                document.getElementById('register-box').style.display = 'none';
                document.getElementById('login-box').style.display = 'block';
            }
        }
    </script>
</body>
</html>
