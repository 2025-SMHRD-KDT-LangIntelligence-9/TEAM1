<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToneGuard AI Scanner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* [1] 전체 레이아웃 */
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #FFFFFF;
            color: #2C3E50;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* [2] 헤더 */
        header { 
            background: #FFFFFF; 
            padding: 20px 225px; 
            display: flex; 
            justify-content: flex-end; 
            align-items: center; 
        }
        .header-menu { display: flex; align-items: center; gap: 15px; }
        .btn-common { padding: 10px 20px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 15px; transition: all 0.3s; color: white; }
        .btn-login { background: #3B82F6; }
        .btn-mypage { background: #64748B; }
        .btn-logout { background: #3B82F6; }

        /* [3] 중앙 히어로 섹션 */
        .hero { 
            flex: 1;
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; /* 위쪽부터 정렬 */
            align-items: center; 
            text-align: center; 
            padding-top: 10px; /* 로고를 더 위로 올림 */
        }
        
        /* 로고 설정 (510px) */
        .hero-logo { width: 510px; margin-bottom: 10px; animation: fadeInDown 1s ease-out; }
        .hero-logo img { width: 100%; height: auto; object-fit: contain; }

        /* 문구 설정 */
        .hero-desc { 
            font-size: 32px; font-weight: 700; margin-bottom: 30px; 
            color: #1E293B;
            animation: fadeInDown 1s ease-out 0.2s both;
            word-break: keep-all; 
        }

        /* [반짝반짝 효과 추가] '진심' 강조 스타일 */
        .highlight-point {
            font-size: 1.2em; /* 다른 글자보다 크게 */
            font-weight: 900;
            /* 금색 반짝임 그라데이션 */
            background: linear-gradient(120deg, #3B82F6 20%, #8ECAE6 40%, #3B82F6 60%, #8ECAE6 80%, #3B82F6 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite; /* 계속 반짝이는 애니메이션 */
            display: inline-block;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* 스캔 시작 버튼 정렬 교정 */
        .btn-scan {
            background: #1E293B; color: white; padding: 20px 60px; border-radius: 50px;
            text-decoration: none; font-size: 20px; font-weight: 900; letter-spacing: -1px;
            box-shadow: 0 10px 25px rgba(30, 41, 59, 0.3);
            transition: all 0.3s;
            margin-bottom: 40px; /* 카드와 겹치지 않게 여백 확보 */
            z-index: 10;
            animation: pulse-animation 2s infinite;
        }
        .btn-scan:hover { transform: scale(1.05); background: #0F172A; }

        @keyframes fadeInDown { 
            from { opacity: 0; transform: translateY(-20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0 rgba(30, 41, 59, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(30, 41, 59, 0); }
            100% { box-shadow: 0 0 0 0 rgba(30, 41, 59, 0); }
        }

        /* [4] 하단 비디오 카드 (디자인 유지) */
        .cards-container { 
            display: flex; gap: 20px; justify-content: center; 
            padding: 0 60px 40px; 
            max-width: 1000px; 
            margin: 0 auto; width: 100%; 
        }
        
        .card {
            position: relative; border-radius: 16px; flex: 1; overflow: hidden; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 180px; transition: all 0.3s ease;
            opacity: 0; animation: slideUpBounce 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            background-color: #1E293B;
        }
        
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.3s; }
        .card:nth-child(3) { animation-delay: 0.5s; }

        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }

        .card-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .card-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 2; }

        .card-title { position: relative; z-index: 3; font-size: 20px; font-weight: 900; color: #FFFFFF; text-shadow: 0 4px 10px rgba(0,0,0,0.6); }

        @keyframes slideUpBounce {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-menu">
            {% if is_logged_in %}
            <a href="/mypage" class="btn-common btn-mypage">My Page</a>
            <a href="/logout" class="btn-common btn-logout">Logout</a>
            {% else %}
            <a href="/login" class="btn-common btn-login">Login</a>
            {% endif %}
        </div>
    </header>

    <main class="hero">
        <div class="hero-logo">
            <img src="{{ url_for('static', path='/logo.png') }}" alt="ToneGuard Logo">
        </div>

        <h1 class="hero-desc">ToneGuard가 <span class="highlight-point">진심</span>을 안전하게 전달합니다.</h1>
        
        {% if is_logged_in %}
        <a href="#" class="btn-scan" onclick="runScanner(event)">스캔 시작하기</a>
        {% else %}
        <a href="#" class="btn-scan" onclick="requireLogin(event)">스캔 시작하기</a>
        {% endif %}
    </main>

    <section class="cards-container">
        <div class="card">
            <video autoplay loop muted playsinline class="card-video">
                <source src="{{ url_for('static', path='/실시간감지.mp4') }}" type="video/mp4">
            </video>
            <div class="card-overlay"></div>
            <div class="card-title">실시간 감지</div>
        </div>
        
        <div class="card">
            <video autoplay loop muted playsinline class="card-video">
                <source src="{{ url_for('static', path='/톤분석.mp4') }}" type="video/mp4">
            </video>
            <div class="card-overlay"></div>
            <div class="card-title">톤 분석</div>
        </div>
        
        <div class="card">
            <video autoplay loop muted playsinline class="card-video">
                <source src="{{ url_for('static', path='/대안제시.mp4') }}" type="video/mp4">
            </video>
            <div class="card-overlay"></div>
            <div class="card-title">대안 제시</div>
        </div>
    </section>

    <script>
        function requireLogin(event) { event.preventDefault(); alert("안내: 로그인이 필요합니다."); window.location.href = "/login"; }
        function runScanner(event) {
            event.preventDefault();
            fetch('/start-scanner', { method: 'POST' })
                .then(res => res.json())
                .then(data => { if (data.status === 'success') alert("스캐너가 실행되었습니다."); else alert("에러: " + data.message); });
        }
    </script>
</body>
</html>
