<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToneGuard</title>
    
    <style>
        /* [1] 기본 스타일 및 폰트 설정 */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: "맑은 고딕", "Malgun Gothic", sans-serif;
            background: #F4F7FA;
            color: #2C3E50;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* [2] 상단 헤더 */
        header {
            background: #FFFFFF;
            padding: 10px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #E2E8F0;
        }
        .logo-area img {
            height: 60px;
            width: auto;
            object-fit: contain;
        }

        .header-menu {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-login {
            background: #3B82F6; color: white;
            padding: 10px 25px; border-radius: 10px;
            text-decoration: none; font-weight: bold; font-size: 14px;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #2563EB; }

        .btn-text {
            color: #2C3E50; font-weight: bold; text-decoration: none; font-size: 14px;
        }
        .btn-logout {
            color: #F43F5E; font-weight: bold; text-decoration: none; font-size: 14px;
        }

        /* [3] 중앙 히어로 섹션 */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }
        .hero-subtitle { color: #3B82F6; font-weight: bold; font-size: 14px; margin-bottom: 15px; letter-spacing: 1px; }
        .hero-title { font-size: 46px; font-weight: 800; line-height: 1.3; margin-bottom: 20px; color: #1E293B; }
        .hero-desc { color: #64748B; font-size: 18px; margin-bottom: 40px; }

        .btn-scan {
            background: #10B981; color: white;
            padding: 18px 55px; border-radius: 35px;
            text-decoration: none; font-size: 18px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            transition: all 0.3s;
        }
        .btn-scan:hover { transform: scale(1.05); background: #059669; }

        /* [4] 하단 기능 설명 카드 섹션 */
        .cards-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            padding: 0 80px 60px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .card {
            background: white; border-radius: 20px;
            padding: 30px 25px; flex: 1;
            border: 1px solid #E2E8F0;
            position: relative; overflow: hidden;
            opacity: 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card.animate { animation: slideUp 0.6s cubic-bezier(.22,.8,.36,1) forwards; }
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.3s; }
        .card:nth-child(3) { animation-delay: 0.5s; }

        .dot { width: 10px; height: 10px; border-radius: 50%; margin-bottom: 15px; }
        .dot-green { background: #10B981; }
        .dot-blue { background: #3B82F6; }
        .dot-yellow { background: #F59E0B; }

        .card-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; color: #1E293B; }
        .card-desc { font-size: 14px; color: #64748B; line-height: 1.6; }

        .shimmer {
            position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmerEffect 3s infinite;
        }
        @keyframes shimmerEffect {
            0% { left: -100%; }
            100% { left: 150%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="{{ url_for('static', path='/logo.png') }}" alt="ToneGuard Logo">
        </div>
        
        <div class="header-menu">
            {% if is_logged_in %}
                <a href="/mypage" class="btn-text">마이페이지</a>
                <a href="/logout" class="btn-logout">로그아웃</a>
            {% else %}
                <a href="/login" class="btn-login">로그인</a>
            {% endif %}
        </div>
    </header>

    <main class="hero">
        <p class="hero-subtitle">TONE GUARD · AI 말투 교정</p>
        <h1 class="hero-title">무심코 보낸 한 줄이<br>관계를 바꿉니다</h1>
        <p class="hero-desc">보내기 전, 말투를 한 번 더.</p>
        
        {% if is_logged_in %}
            <a href="#" class="btn-scan" onclick="runScanner(event)">Scan (스캔 시작)</a>
        {% else %}
            <a href="#" class="btn-scan" onclick="requireLogin(event)">Scan (스캔 시작)</a>
        {% endif %}
    </main>

    <section class="cards-container">
        <div class="card animate">
            <div class="shimmer"></div>
            <div class="dot dot-green"></div>
            <div class="card-title">실시간 감지</div>
            <div class="card-desc">메신저 입력창을 감지하여<br>텍스트를 자동으로 캡처</div>
        </div>
        <div class="card animate">
            <div class="shimmer"></div>
            <div class="dot dot-blue"></div>
            <div class="card-title">톤 분석</div>
            <div class="card-desc">문맥과 상황을 고려한<br>AI 감정 분석 수행</div>
        </div>
        <div class="card animate">
            <div class="shimmer"></div>
            <div class="dot dot-yellow"></div>
            <div class="card-title">대안 제시</div>
            <div class="card-desc">상황에 맞는 교정 문장<br>3가지 스타일 추천</div>
        </div>
    </section>

    <script>
        // [1] 비로그인 사용자가 스캔 버튼을 눌렀을 때
        function requireLogin(event) {
            event.preventDefault(); 
            alert("보안 안내: 로그인이 필요한 서비스입니다.");
            window.location.href = "/login";
        }

        // [2] 로그인 사용자가 스캔 시작을 눌렀을 때 (메인 창 최소화 및 스캐너 가동)
        function runScanner(event) {
            event.preventDefault(); 
            
            // 파이썬 서버(/start-scanner)에 요청을 보냅니다.
            fetch('/start-scanner', { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    console.log("ToneGuard 스캐너가 성공적으로 가동되었습니다.");
                    // 💡 서버에서 이미 창을 최소화하도록 main_web.py에 코드를 넣어두었습니다.
                } else {
                    alert("스캐너 실행 중 오류가 발생했습니다: " + data.message);
                }
            })
            .catch(error => {
                console.error("서버 통신 오류:", error);
                alert("서버 연결에 실패했습니다.");
            });
        }
    </script>
</body>
</html>
