<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ToneGuard 마이페이지</title>
    <style>
        /* [1] 색상 팔레트 설정: 전역 변수를 사용하여 색상을 일관되게 관리합니다. */
        :root {
            --header-w: #FFFFFF; /* 흰색 배경 */
            --bg-sub: #F4F7FA;   /* 연한 회색 배경 */
            --text-d: #2C3E50;   /* 기본 글자색 */
            --success-m: #10B981;/* 성공/안내 초록색 */
            --primary-b: #3B82F6;/* 주요 포인트 파란색 */
            --danger-p: #F43F5E; /* 경고/탈퇴 빨간색 */
            --border-c: #E2E8F0; /* 테두리 연한 회색 */
        }

        /* [2] 기본 레이아웃: 화면 전체를 채우는 유연한 박스 설정 */
        body { 
            font-family: '맑은 고딕', sans-serif; background: var(--bg-sub); 
            margin: 0; color: var(--text-d); display: flex; flex-direction: column; min-height: 100vh; 
        }

        /* [3] 상단 헤더: 로고와 환영 인사, 메인 이동 버튼 배치 */
        header { 
            background: var(--header-w); height: 80px; display: flex; justify-content: space-between; 
            align-items: center; padding: 0 40px; border-bottom: 1px solid var(--border-c); 
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .greeting { font-size: 18px; font-weight: bold; }
        .btn-back { padding: 8px 15px; border: 1px solid var(--border-c); border-radius: 8px; color: var(--text-d); text-decoration: none; font-size: 14px; font-weight: bold; transition: 0.2s; }
        .btn-back:hover { background: #F8FAFC; }

        /* [4] 메인 컨테이너: 사이드바와 콘텐츠를 가로로 배치 */
        .container { display: flex; flex: 1; padding: 30px 40px; gap: 20px; }

        /* 좌측 사이드바 디자인 */
        .sidebar { background: var(--header-w); width: 230px; border-radius: 20px; border: 1px solid var(--border-c); padding: 30px 15px; }
        .sidebar-title { color: var(--primary-b); font-size: 12px; font-weight: bold; margin-bottom: 15px; padding-left: 10px; }
        .menu-btn { display: block; width: 100%; text-align: left; background: transparent; border: none; padding: 15px 10px; font-size: 15px; font-weight: bold; color: var(--text-d); border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .menu-btn:hover { background: var(--bg-sub); }

        /* 우측 콘텐츠 영역 디자인 */
        .content { background: var(--header-w); flex: 1; border-radius: 20px; border: 1px solid var(--border-c); padding: 50px; position: relative; }
        
        /* [SPA 방식] 뷰 섹션 숨김/표시 처리 */
        .view-section { display: none; text-align: center; }
        .view-section.active { display: block; }

        /* 교정 기록 카드 디자인 */
        .history-card { background: var(--bg-sub); border: 1px solid var(--border-c); border-radius: 15px; padding: 20px; margin-bottom: 15px; text-align: left; }
        .history-card span { color: var(--success-m); font-weight: bold; display: block; margin-bottom: 10px; }

        /* 각종 버튼 및 입력창 디자인 */
        .btn-large { width: 240px; height: 65px; border-radius: 15px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; margin: 10px auto; display: block; transition: 0.2s; }
        .btn-blue { background: var(--primary-b); color: white; }
        .btn-blue:hover { background: #2563EB; }
        .btn-danger-outline { background: #FFF1F2; color: var(--danger-p); border: 1px solid var(--danger-p); }
        .btn-success { background: var(--success-m); color: white; border-radius: 30px; height: 55px; }
        .btn-danger { background: var(--danger-p); color: white; border-radius: 30px; height: 55px; }

        .input-group { display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .input-group label { width: 140px; text-align: right; margin-right: 15px; font-weight: bold; }

        /* [핵심] 비밀번호 입력창 내부 아이콘 배치 설정 */
        .password-wrapper { position: relative; display: inline-block; width: 240px; }
        .password-wrapper input { 
            width: 100% !important; height: 48px; border-radius: 12px; border: 1px solid var(--border-c); 
            background: var(--bg-sub); padding: 0 45px 0 15px; box-sizing: border-box; 
        }

        /* 눈 아이콘: 입력창 위에 겹쳐서 배치 */
        .eye-icon {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            cursor: pointer; font-size: 18px; color: #94A3B8; user-select: none; z-index: 10;
        }
        .eye-icon:hover { color: #3B82F6; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <img src="{{ url_for('static', path='/logo.png') }}" alt="Logo" height="50">
            <span class="greeting">반갑습니다, {{ user_name }}님</span>
        </div>
        <a href="/" class="btn-back">메인으로 돌아가기</a>
    </header>

    <div class="container">
        <div class="sidebar">
            <div class="sidebar-title">MY MENU</div>
            <button class="menu-btn" onclick="showView('history-view'); loadHistory();">📜 나의 교정 기록</button>
            <button class="menu-btn" onclick="showView('settings-view')">⚙️ 설정 및 관리</button>
        </div>

        <div class="content">
            <div id="default-view" class="view-section active">
                <h1 style="color: var(--border-c); font-size: 50px; margin-top: 20%;">ToneGuard</h1>
            </div>

            <div id="history-view" class="view-section">
                <h2 style="text-align: left; margin-bottom: 20px;">나의 교정 기록</h2>
                <div id="history-list">
                    <p style="color: #64748B;">기록을 불러오는 중...</p>
                </div>
            </div>

            <div id="settings-view" class="view-section">
                <h2 style="margin-bottom: 40px;">설정 및 관리</h2>
                <button class="btn-large btn-blue" onclick="showView('edit-view')">👤 정보 수정</button>
                <button class="btn-large btn-danger-outline" onclick="showView('withdraw-view')">⚠️ 탈퇴</button>
            </div>

            <div id="edit-view" class="view-section">
                <h2 style="color: var(--success-m); margin-bottom: 40px;">비밀번호 변경</h2>
                
                <div class="input-group">
                    <label>기존 비밀번호</label>
                    <div class="password-wrapper">
                        <input type="password" id="pw-old"> 
                        <span class="eye-icon" onclick="togglePassword('pw-old', this)">👁️</span>
                    </div>
                </div>
                
                <div class="input-group">
                    <label>새 비밀번호</label>
                    <div class="password-wrapper">
                        <input type="password" id="pw-new">
                        <span class="eye-icon" onclick="togglePassword('pw-new', this)">👁️</span>
                    </div>
                </div>
                
                <div class="input-group">
                    <label>새 비밀번호 확인</label>
                    <div class="password-wrapper">
                        <input type="password" id="pw-confirm">
                        <span class="eye-icon" onclick="togglePassword('pw-confirm', this)">👁️</span>
                    </div>
                </div>
                
                <button class="btn-large btn-success" style="margin-top: 30px;" onclick="alert('변경 완료!')">변경 완료</button>
            </div>

            <div id="withdraw-view" class="view-section">
                <h2 style="color: var(--danger-p); margin-top: 100px;">회원 탈퇴</h2>
                <p>탈퇴하시면 모든 데이터가 삭제되며 복구할 수 없습니다.<br>정말로 톤가드를 떠나시겠습니까?</p>
                <button class="btn-large btn-danger" style="margin-top: 40px;" onclick="confirmWithdraw()">탈퇴 확인</button>
            </div>
        </div>
    </div>

    <script>
        // [1] 화면 전환 함수: 모든 섹션을 숨기고 선택한 ID의 섹션만 보여줍니다.
        function showView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

       // [보안 강화] 1.5초 동안만 비밀번호를 보여주는 함수
        function togglePassword(inputId, iconElement) {
            const passwordInput = document.getElementById(inputId);
            if (!passwordInput) return;

            // 1. 이미 텍스트 상태라면(타이머 작동 중) 중복 실행 방지
            if (passwordInput.type === "text") return;

            // 2. 비밀번호를 즉시 보여주고 아이콘 변경
            passwordInput.type = "text";
            iconElement.innerText = "👁️‍🗨️"; // 눈 뜬 모양

            // 3. 1500밀리초(1.5초) 후에 자동으로 다시 가리기
            setTimeout(() => {
                passwordInput.type = "password";
                iconElement.innerText = "👁️"; // 눈 감은 모양으로 복구
            }, 1500); 
        }

        // [3] 교정 기록 로드 함수: 서버의 API로부터 데이터를 가져와 카드를 생성합니다.
        function loadHistory() {
            const listContainer = document.getElementById('history-list');
            
            fetch('/api/history') // main_web.py에 정의된 API 경로로 요청
                .then(response => response.json())
                .then(data => {
                    listContainer.innerHTML = ''; // 기존 "불러오는 중" 메시지 삭제
                    
                    if (data.history.length === 0) {
                        listContainer.innerHTML = '<p>기록이 없습니다.</p>';
                        return;
                    }

                    // 데이터를 반복문으로 돌려 HTML 카드를 생성
                    data.history.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'history-card';
                        card.innerHTML = `
                            <span>[${item.tone}]</span>
                            <p>원문: ${item.original}</p>
                            <p style="font-weight:bold;">교정: ${item.corrected}</p>
                        `;
                        listContainer.appendChild(card);
                    });
                })
                .catch(err => {
                    listContainer.innerHTML = '<p style="color:red;">데이터를 불러오는 중 오류가 발생했습니다.</p>';
                });
        }

        // [4] 회원 탈퇴 확인 함수
        function confirmWithdraw() {
            if(confirm("확실히 탈퇴를 하시겠습니까?\n이 작업은 되돌릴 수 없습니다.")) {
                alert("탈퇴 완료. 메인으로 이동합니다.");
                window.location.href = "/logout";
            }
        }
    </script>
</body>
</html>
