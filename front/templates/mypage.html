<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ToneGuard 마이페이지</title>
    <style>
        /* =========================================
           [1] 색상 팔레트 (CSS 변수)
           - 여기서 색상을 지정해두면 문서 전체에서 재사용할 수 있습니다.
           ========================================= */
        :root {
            --header-w: #FFFFFF; /* 순백색 (헤더, 콘텐츠 배경) */
            --bg-sub: #F4F7FA;   /* 연한 쿨그레이 (전체 배경) */
            --text-d: #2C3E50;   /* 다크 네이비 (기본 텍스트 색상) */
            --success-m: #10B981;/* 에메랄드 민트 (성공/강조) */
            --primary-b: #3B82F6;/* 산뜻한 블루 (주요 버튼/포인트) */
            --danger-p: #F43F5E; /* 로즈 핑크 (경고/탈퇴) */
            --border-c: #E2E8F0; /* 연한 회색 (테두리/구분선) */
        }

        /* [2] 전체 기본 레이아웃 */
        body { 
            font-family: '맑은 고딕', sans-serif; 
            background: var(--bg-sub); /* 변수로 지정한 배경색 적용 */
            margin: 0; 
            color: var(--text-d); 
            display: flex; 
            flex-direction: column; /* 요소를 세로로 배치 */
            min-height: 100vh; /* 화면 전체 높이 사용 */
        }

        /* [3] 상단 헤더 영역 */
        header { 
            background: var(--header-w); height: 80px; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 40px; border-bottom: 1px solid var(--border-c); 
        }
        .header-left { display: flex; align-items: center; gap: 15px; } /* 로고와 인사말 묶음 */
        .greeting { font-size: 18px; font-weight: bold; }
        
        /* 메인 복귀 버튼 디자인 */
        .btn-back { 
            padding: 8px 15px; border: 1px solid var(--border-c); border-radius: 8px; 
            color: var(--text-d); text-decoration: none; font-size: 14px; font-weight: bold; transition: 0.2s; 
        }
        .btn-back:hover { background: #F8FAFC; } /* 마우스 오버 시 연한 배경 */

        /* [4] 중앙 컨테이너 (사이드바 + 메인 콘텐츠) */
        .container { display: flex; flex: 1; padding: 30px 40px; gap: 20px; } /* 두 요소를 가로로 배치하고 20px 띄움 */

        /* 좌측 사이드바 메뉴 영역 */
        .sidebar { 
            background: var(--header-w); width: 230px; border-radius: 20px; 
            border: 1px solid var(--border-c); padding: 30px 15px; 
        }
        .sidebar-title { color: var(--primary-b); font-size: 12px; font-weight: bold; margin-bottom: 15px; padding-left: 10px; }
        
        /* 사이드바 내부 버튼 디자인 */
        .menu-btn { 
            display: block; width: 100%; text-align: left; background: transparent; border: none; 
            padding: 15px 10px; font-size: 15px; font-weight: bold; color: var(--text-d); 
            border-radius: 10px; cursor: pointer; transition: 0.2s; 
        }
        .menu-btn:hover { background: var(--bg-sub); }

        /* 우측 메인 콘텐츠 화면 영역 */
        .content { 
            background: var(--header-w); flex: 1; /* 남은 가로 공간을 모두 차지함 */
            border-radius: 20px; border: 1px solid var(--border-c); padding: 50px; position: relative; 
        }
        
        /* [SPA 핵심 로직] 뷰 숨김/표시 처리 */
        .view-section { display: none; text-align: center; } /* 기본적으로 모든 뷰를 숨김 */
        .view-section.active { display: block; } /* 'active' 클래스가 붙은 뷰만 화면에 표시됨 */

        /* 교정 기록 카드 디자인 */
        .history-card { 
            background: var(--bg-sub); border: 1px solid var(--border-c); border-radius: 15px; 
            padding: 20px; margin-bottom: 15px; text-align: left; 
        }
        .history-card span { color: var(--success-m); font-weight: bold; display: block; margin-bottom: 10px; }

        /* 각종 큼직한 제어 버튼들 */
        .btn-large { 
            width: 240px; height: 65px; border-radius: 15px; border: none; 
            font-size: 16px; font-weight: bold; cursor: pointer; margin: 10px auto; display: block; transition: 0.2s; 
        }
        .btn-blue { background: var(--primary-b); color: white; }
        .btn-blue:hover { background: #2563EB; }
        .btn-danger-outline { background: #FFF1F2; color: var(--danger-p); border: 1px solid var(--danger-p); }
        .btn-danger-outline:hover { background: #FFE4E6; }
        .btn-success { background: var(--success-m); color: white; border-radius: 30px; height: 55px; }
        .btn-danger { background: var(--danger-p); color: white; border-radius: 30px; height: 55px; }

        /* 정보 수정용 입력창 디자인 */
        .input-group { display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .input-group label { width: 140px; text-align: right; margin-right: 15px; font-weight: bold; }
        .input-group input { 
            width: 240px; height: 48px; border-radius: 12px; border: 1px solid var(--border-c); 
            background: var(--bg-sub); padding: 0 15px; 
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <img src="{{ url_for('static', path='/logo.png') }}" alt="Logo" height="50">
            <span class="greeting">반갑습니다, {{ user_name }}님</span>
        </div>
        <a href="/" class="btn-back">메인으로 돌아가기</a>
    </header>

    <div class="container">
        <div class="sidebar">
            <div class="sidebar-title">MY MENU</div>
            <button class="menu-btn" onclick="showView('history-view')">📜 나의 교정 기록</button>
            <button class="menu-btn" onclick="showView('settings-view')">⚙️ 설정 및 관리</button>
        </div>

        <div class="content">
            
            <div id="default-view" class="view-section active">
                <h1 style="color: var(--border-c); font-size: 50px; margin-top: 20%;">ToneGuard</h1>
            </div>

            <div id="history-view" class="view-section">
                <h2 style="text-align: left; margin-bottom: 20px;">나의 교정 기록</h2>
                <div id="history-list">
                    <p style="color: #64748B;">기록을 불러오는 중...</p>
                    </div>
            </div>

            <div id="settings-view" class="view-section">
                <h2 style="margin-bottom: 40px;">설정 및 관리</h2>
                <button class="btn-large btn-blue" onclick="showView('edit-view')">👤 정보 수정</button>
                <button class="btn-large btn-danger-outline" onclick="showView('withdraw-view')">⚠️ 탈퇴</button>
            </div>

            <div id="edit-view" class="view-section">
                <div style="text-align: left; color: var(--success-m); font-weight: bold; margin-bottom: 30px;">
                    <span style="color: var(--text-d); cursor:pointer;" onclick="showView('settings-view')">설정 > </span>정보 수정
                </div>
                <h2 style="color: var(--success-m); margin-bottom: 40px;">비밀번호 변경</h2>
                
                <div class="input-group">
                    <label>기존 비밀번호</label><input type="password">
                </div>
                <div class="input-group">
                    <label>새 비밀번호</label><input type="password">
                </div>
                <div class="input-group">
                    <label>새 비밀번호 확인</label><input type="password">
                </div>
                <button class="btn-large btn-success" style="margin-top: 30px;" onclick="alert('변경 완료!')">변경 완료</button>
            </div>

            <div id="withdraw-view" class="view-section">
                <h2 style="color: var(--danger-p); margin-top: 100px;">회원 탈퇴</h2>
                <p>탈퇴하시면 모든 데이터가 삭제되며 복구할 수 없습니다.<br>정말로 톤가드를 떠나시겠습니까?</p>
                <button class="btn-large btn-danger" style="margin-top: 40px;" onclick="confirmWithdraw()">탈퇴 확인</button>
            </div>

        </div>
    </div>

    <script>
        // 탭(화면) 전환을 처리하는 핵심 함수
        function showView(viewId) {
            // 1. '.view-section' 클래스를 가진 모든 요소를 찾아 반복문을 돌면서 'active' 클래스를 제거 (모두 숨김)
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            
            // 2. 전달받은 viewId를 가진 요소만 찾아 'active' 클래스를 추가 (해당 화면만 보임)
            document.getElementById(viewId).classList.add('active');
        }

        // 회원 탈퇴 확인 로직
        function confirmWithdraw() {
            // confirm()은 확인/취소를 선택할 수 있는 경고창을 띄웁니다.
            if(confirm("확실히 탈퇴를 하시겠습니까?\n이 작업은 되돌릴 수 없습니다.")) {
                // '확인'을 눌렀을 경우 안내 후 로그아웃 경로로 강제 이동시켜 세션을 삭제합니다.
                alert("탈퇴 완료. 메인으로 이동합니다.");
                window.location.href = "/logout";
            }
        }
    </script>
</body>
</html>
