    <!DOCTYPE html>
    <html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ToneGuard 로그인 & 회원가입</title>
        <style>
            /* [1] 디자인 스타일 */
            body { font-family: '맑은 고딕', sans-serif; background: #F4F7FA; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
            .card-box { background: white; padding: 35px 40px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 380px; text-align: center; border: 1px solid #E2E8F0; }
            
            .input-group { margin-bottom: 12px; text-align: left; }
            .input-group label { display: block; font-size: 12px; color: #64748B; margin-bottom: 4px; font-weight: bold; cursor: pointer; }
            input[type="email"], input[type="password"], input[type="text"] { 
                width: 100%; padding: 10px 15px; border: 1px solid #CBD5E1; border-radius: 10px; box-sizing: border-box; font-size: 13px; background: #F8FAFC; 
            }
            input:focus { outline: none; border-color: #3B82F6; background: white; }

            /* ✨ 새로 추가된 체크박스 스타일 */
            .checkbox-group { display: flex; align-items: center; gap: 6px; margin-bottom: 15px; text-align: left; }
            .checkbox-group label { font-size: 12px; color: #64748B; cursor: pointer; margin: 0; display: inline-block;}
            .checkbox-group input[type="checkbox"] { width: auto; cursor: pointer; margin: 0;}

            .btn-primary { width: 100%; padding: 12px; background: #3B82F6; color: white; border: none; border-radius: 12px; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 5px; }
            .btn-success { background: #10B981; }
            .btn-success:hover { background: #059669; }
            .btn-text { background: transparent; color: #64748B; border: none; font-size: 13px; margin-top: 15px; cursor: pointer; text-decoration: underline; }

            /* 비밀번호 보안 경고창 */
            #pw-warning { display: none; font-size: 11px; color: #F43F5E; margin-top: 6px; align-items: center; justify-content: space-between; background: #FFF1F2; padding: 8px 10px; border-radius: 8px; }
            .btn-okey { padding: 4px 12px; font-size: 11px; background: #E2E8F0; border: none; border-radius: 6px; cursor: pointer; color: #475569; font-weight: bold; }

            #register-box { display: none; }
        </style>
    </head>
    <body>

        <div class="card-box" id="login-box">
            <h2 style="color: #3B82F6; margin-bottom: 5px;">ToneGuard</h2>
            <p style="color: #64748B; font-size: 13px; margin-bottom: 25px;">환영합니다! 서비스를 시작하세요.</p>
            
            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="login-email">이메일</label>
                    <input type="email" id="login-email" placeholder="Email" required>
                </div>
                <div class="input-group" style="margin-bottom: 8px;">
                    <label for="login-password">비밀번호</label>
                    <input type="password" id="login-password" placeholder="Password" required>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="remember-email">
                    <label for="remember-email">이메일 기억하기</label>
                </div>

                <button type="submit" class="btn-primary">Sign In</button>
            </form>
            <button type="button" class="btn-text" onclick="toggleView('register')">회원가입 하기</button>
        </div>

        <div class="card-box" id="register-box">
            <h2 style="color: #3B82F6; font-size: 22px; margin-bottom: 20px;">Create Account</h2>
            <form onsubmit="handleRegister(event)">
                <div class="input-group">
                    <label for="reg-email">이메일 (*)</label>
                    <input type="email" id="reg-email" placeholder="user@email.com" required>
                </div>
                <div class="input-group">
                    <label for="reg-password">비밀번호 (*)</label>
                    <input type="password" id="reg-password" oninput="checkPasswordStrength()" required>
                    <div id="pw-warning">
                        <span>⚠️ 쉬운 비밀번호입니다.<br>이대로 진행하시겠습니까?</span>
                        <button type="button" class="btn-okey" onclick="confirmWeakPassword()">Okey</button>
                    </div>
                </div>
                <div class="input-group">
                    <label for="reg-name">이름 (*)</label>
                    <input type="text" id="reg-name" placeholder="Name" required>
                </div>
                <div class="input-group">
                    <label for="reg-dept">소속 (선택)</label>
                    <input type="text" id="reg-dept" placeholder="Department">
                </div>
                <div class="input-group">
                    <label for="reg-job">직무 (선택)</label>
                    <input type="text" id="reg-job" placeholder="Job Title">
                </div>
                <button type="submit" id="btn-register-submit" class="btn-primary btn-success" style="margin-top: 15px;">Sign Up</button>
            </form>
            <button type="button" class="btn-text" onclick="toggleView('login')">로그인 화면으로 돌아가기</button>
        </div>

        <script>
            const BASE_URL = "http://192.168.0.77:8000"; 
            let isWeakConfirmed = false;

            // ✨ 1. 페이지가 처음 열릴 때 (새로고침 시) 실행되는 로직
            document.addEventListener("DOMContentLoaded", () => {
                const savedEmail = localStorage.getItem("remembered_email");
                
                // 만약 브라우저에 저장된 이메일이 있다면?
                if (savedEmail) {
                    document.getElementById("login-email").value = savedEmail; // 이메일 칸 채우기
                    document.getElementById("remember-email").checked = true;  // 체크박스에 V 표시하기
                    document.getElementById("login-password").focus();         // 커서를 비밀번호 칸에 두기
                }
            });

            function toggleView(target) {
                document.getElementById('login-box').style.display = target === 'register' ? 'none' : 'block';
                document.getElementById('register-box').style.display = target === 'register' ? 'block' : 'none';
            }

            function checkPasswordStrength() {
                const pw = document.getElementById('reg-password').value;
                const warningBox = document.getElementById('pw-warning');
                const submitBtn = document.getElementById('btn-register-submit');
                if (pw.length === 0) {
                    isWeakConfirmed = false; warningBox.style.display = 'none';
                    submitBtn.disabled = false; submitBtn.style.opacity = '1';
                    return;
                }
                isWeakConfirmed = false;
                const isWeak = (pw.length < 8 || /^[0-9]+$/.test(pw));
                if (isWeak) {
                    warningBox.style.display = 'flex';
                    submitBtn.disabled = true; submitBtn.style.opacity = '0.5';
                } else {
                    warningBox.style.display = 'none';
                    submitBtn.disabled = false; submitBtn.style.opacity = '1';
                }
            }

            function confirmWeakPassword() {
                isWeakConfirmed = true;
                document.getElementById('pw-warning').style.display = 'none';
                const btn = document.getElementById('btn-register-submit');
                btn.disabled = false; btn.style.opacity = '1';
            }

            // [로그인 로직]
            // [로그인 로직] 핵심 수정 부분 (119번 줄 근처)
            async function handleLogin(event) {
                event.preventDefault();
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;
                const isRememberChecked = document.getElementById('remember-email').checked;

                try {
                    const response = await fetch(`${BASE_URL}/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password }) 
                    });

                    const data = await response.json();
                    if (response.ok) {
                        // ✨ [수정 완료] max-age를 삭제했습니다. 이제 창을 닫으면 사라지는 '세션 쿠키'가 됩니다.
                        document.cookie = `jwt_token=${data.access_token}; path=/;`; 
                        
                        // 임시 창고인 sessionStorage에 저장합니다. (이미 잘 작성하셨습니다!)
                        sessionStorage.setItem("jwt_token", data.access_token);
                        
                        // 이메일 기억하기 로직 (유지)
                        if (isRememberChecked) {
                            localStorage.setItem("remembered_email", email);
                        } else {
                            localStorage.removeItem("remembered_email");
                        }

                        window.location.href = "/"; 
                    } else {
                        const err = await response.json();
                        alert("로그인 실패: " + (err.detail || "정보를 확인하세요."));
                    }
                } catch (e) { 
                    alert("서버 연결 실패! 주소(192.168.0.77:8000)를 확인하세요."); 
                }
            }

            // [회원가입 로직]
            async function handleRegister(event) {
                event.preventDefault();
                
                // 가입 시도한 이메일 잠시 기억
                const registeredEmail = document.getElementById('reg-email').value;

                const bodyData = {
                    email: registeredEmail,
                    password: document.getElementById('reg-password').value,
                    name: document.getElementById('reg-name').value,
                    dept: document.getElementById('reg-dept').value || null,
                    job: document.getElementById('reg-job').value || null
                };

                try {
                    const response = await fetch(`${BASE_URL}/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(bodyData)
                    });

                    if (response.ok) {
                        alert("회원가입 성공! 이제 로그인해 주세요.");
                        
                        // 가입 폼 내용 초기화
                        event.target.reset();
                        isWeakConfirmed = false;
                        document.getElementById('pw-warning').style.display = 'none';
                        const submitBtn = document.getElementById('btn-register-submit');
                        submitBtn.disabled = false; submitBtn.style.opacity = '1';

                        // 방금 가입한 이메일을 로그인 창에 세팅 후 화면 전환
                        document.getElementById('login-email').value = registeredEmail;
                        toggleView('login');
                        document.getElementById('login-password').focus();

                    } else {
                        const err = await response.json();
                        alert("회원가입 실패: " + (err.detail || "오류 발생"));
                    }
                } catch (e) { alert("서버 연결 실패! 주소(192.168.0.77:8000)를 확인하세요."); }
            }
        </script>
    </body>
    </html>
